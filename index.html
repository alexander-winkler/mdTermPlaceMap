<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: sans-serif; }
    #map { height: 100%; width: 100%; }

    /* optional: nice popup styling */
    .leaflet-popup-content { font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
<div id="map"></div>

<script>

  // === Load from data.json ===
  fetch('data.json')
    .then(r => r.json())
     .then(items => renderMarkers(items));

  const map = L.map('map').setView([35.86, 104.19], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution:
      '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  }).addTo(map);

  function renderMarkers(items) {
    const group = L.featureGroup();

    items.forEach(item => {
L.marker([item.latitude, item.longitude])
  .bindPopup(`<b>${item.name} <a href="https://term.museum-digital.de/md-de/place/${item.id}">(${item.id})</a></b><br>${item.note ? item.note.substring(0, 200) + (item.note.length > 200 ? '...' : '') : ''}`)
        .addTo(group);
    });

    group.addTo(map);
    map.fitBounds(group.getBounds().pad(0.1));
  }

  renderMarkers(items);
</script>
</body>
</html>
